<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tyron Runtime</title>
    <style>
      body {
        margin: 0;
        background: #090c15;
        color: #e6ebf4;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 18px;
        background: rgba(10, 16, 26, 0.9);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      main {
        height: calc(100vh - 56px);
        position: relative;
      }
      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      button {
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: transparent;
        color: #e6ebf4;
        padding: 6px 14px;
        border-radius: 999px;
        cursor: pointer;
      }
      .controls {
        position: absolute;
        right: 16px;
        bottom: 16px;
        display: grid;
        grid-template-columns: 56px 56px 56px;
        grid-template-rows: 56px 56px 56px;
        gap: 8px;
        pointer-events: auto;
      }
      .controls button {
        border-radius: 16px;
        background: rgba(10, 16, 28, 0.7);
        font-weight: 600;
      }
      .controls button:active {
        background: rgba(51, 209, 194, 0.25);
        border-color: rgba(51, 209, 194, 0.6);
      }
      .controls .spacer {
        pointer-events: none;
        background: transparent;
        border: none;
      }
    </style>
  </head>
  <body>
    <header>
      <div>Tyron Runtime</div>
      <button id="loadScene">Load Scene</button>
    </header>
    <main>
      <canvas id="runtime"></canvas>
      <div class="controls" aria-label="Movement controls">
        <button class="spacer" tabindex="-1"></button>
        <button data-move="forward">▲</button>
        <button class="spacer" tabindex="-1"></button>
        <button data-move="left">◀</button>
        <button data-move="back">▼</button>
        <button data-move="right">▶</button>
        <button class="spacer" tabindex="-1"></button>
        <button data-move="jump">⤒</button>
        <button class="spacer" tabindex="-1"></button>
      </div>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "./assets/vendor/three.module.js",
          "three/addons/": "./assets/vendor/"
        }
      }
    </script>
    <script type="module" src="./src/runtime/runtime.js"></script>
  </body>
</html>
