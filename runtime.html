<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tyron Runtime</title>
    <style>
      body {
        margin: 0;
        background: #090c15;
        color: #e6ebf4;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 18px;
        background: rgba(10, 16, 26, 0.9);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      main {
        height: calc(100vh - 56px);
      }
      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      button {
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: transparent;
        color: #e6ebf4;
        padding: 6px 14px;
        border-radius: 999px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header>
      <div>Tyron Runtime</div>
      <button id="loadScene">Load Scene</button>
    </header>
    <main>
      <canvas id="runtime"></canvas>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "./assets/vendor/three.module.js"
        }
      }
    </script>
    <script type="module" src="./src/runtime/runtime.js"></script>
  </body>
</html>
